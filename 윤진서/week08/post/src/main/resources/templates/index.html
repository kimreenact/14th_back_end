<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${appName}">게시글 관리 API</title>
    <style>
        body { font-family: sans-serif; max-width: 640px; margin: 60px auto; line-height: 1.6; color: #222; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
        a.btn { display: inline-block; margin-top: 12px; padding: 10px 18px;
                background: #2d6cdf; color: #fff; text-decoration: none; border-radius: 6px; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; font-size: 14px; }
        th { background: #f7f7f7; }
    </style>
</head>
<body>
    <h1 th:text="${appName}">게시글 관리 API</h1>
    <p>8주차 과제 - CRUD REST API 가 정상적으로 실행 중입니다.</p>

    <a class="btn" th:href="${swaggerUrl}" href="/swagger-ui.html">Swagger UI 열기</a>

    <table>
        <thead>
            <tr><th>기능</th><th>Method</th><th>URL</th></tr>
        </thead>
        <tbody>
            <tr><td>게시글 생성</td><td>POST</td><td><code>/api/posts</code></td></tr>
            <tr><td>전체 조회</td><td>GET</td><td><code>/api/posts</code></td></tr>
            <tr><td>상세 조회</td><td>GET</td><td><code>/api/posts/{id}</code></td></tr>
            <tr><td>수정</td><td>PATCH</td><td><code>/api/posts/{id}</code></td></tr>
            <tr><td>삭제</td><td>DELETE</td><td><code>/api/posts/{id}</code></td></tr>
        </tbody>
    </table>
</body>
</html>
