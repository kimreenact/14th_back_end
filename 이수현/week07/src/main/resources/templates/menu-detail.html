<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${menu.name} + ' | Cozy Bean'">메뉴 상세</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #fdf6ec; color: #3d2b1f; }

        header {
            background: #3d2b1f;
            color: #fdf6ec;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 1.6rem; letter-spacing: 2px; }
        header a { color: #f5c97a; text-decoration: none; font-size: 0.95rem; }

        .container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 2rem;
        }
        .detail-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(61,43,31,0.1);
        }
        .detail-img {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
        }
        .coffee-bg { background: #f5e6cc; }
        .ade-bg { background: #d4f0e0; }
        .tea-bg { background: #e8f5d4; }
        .dessert-bg { background: #fce4ec; }

        .detail-body { padding: 2rem; }
        .category-badge {
            display: inline-block;
            background: #f5e6cc;
            color: #7a5c45;
            font-size: 0.8rem;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }
        .detail-name { font-size: 1.8rem; margin-bottom: 0.8rem; }
        .detail-price { font-size: 1.3rem; color: #7a5c45; margin-bottom: 2rem; }
        .detail-id { font-size: 0.85rem; color: #a08060; margin-bottom: 2rem; }

        .btn-group { display: flex; gap: 1rem; }
        .btn {
            flex: 1;
            padding: 0.9rem;
            border-radius: 30px;
            font-size: 1rem;
            text-align: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #3d2b1f; color: #fdf6ec; }
        .btn-primary:hover { background: #5a3e2b; }
        .btn-outline { background: transparent; color: #3d2b1f; border: 2px solid #3d2b1f; }
        .btn-outline:hover { background: #3d2b1f; color: #fdf6ec; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #a08060;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #3d2b1f; }

        footer {
            text-align: center;
            padding: 2rem;
            background: #3d2b1f;
            color: #a08060;
            font-size: 0.85rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
<header>
    <h1><a href="/" style="color:#fdf6ec; text-decoration:none;">☕ Cozy Bean</a></h1>
    <a href="/menus">← 메뉴 목록</a>
</header>

<div class="container">
    <div class="detail-card">
        <div th:class="'detail-img ' + (${menu.category == 'COFFEE'} ? 'coffee-bg' :
                            (${menu.category == 'ADE'} ? 'ade-bg' :
                            (${menu.category == 'TEA'} ? 'tea-bg' : 'dessert-bg')))">
                <span th:text="${menu.category == 'COFFEE'} ? '☕' :
                               (${menu.category == 'ADE'} ? '🧃' :
                               (${menu.category == 'TEA'} ? '🍵' : '🍰'))">☕</span>
        </div>
        <div class="detail-body">
            <div class="category-badge" th:text="${menu.category}">COFFEE</div>
            <h2 class="detail-name" th:text="${menu.name}">메뉴 이름</h2>
            <p class="detail-price" th:text="${#numbers.formatInteger(menu.price, 3, 'COMMA')} + '원'">5,000원</p>
            <p class="detail-id" th:text="'메뉴 번호: ' + ${menu.id}">메뉴 번호: 1</p>
            <div class="btn-group">
                <a th:href="@{/menus/{id}/edit(id=${menu.id})}" class="btn btn-outline">수정하기</a>
                <a href="/menus" class="btn btn-primary">목록으로</a>
            </div>
        </div>
    </div>
    <a href="/menus" class="back-link">← 전체 메뉴 보러가기</a>
</div>

<footer>
    <p>© 2025 Cozy Bean Café. All rights reserved.</p>
</footer>
</body>
</html>
